name: Docs Quality

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  markdown-and-links:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Markdown lint
        run: npx --yes markdownlint-cli2

      - name: Link check
        uses: lycheeverse/lychee-action@v2
        with:
          args: --verbose --no-progress --offline README.md CONTRIBUTING.md docs/index.md docs/**/README.md updates/**/*.md templates/**/*.md
